<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Log to Letter icon</title>
  <desc id="desc">A soft white envelope with one green three-leaf clover sticker.</desc>
  <defs>
